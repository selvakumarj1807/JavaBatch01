<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            border: 2px solid red;
            display: flex;
            gap: 20px;
            padding: 20px;
            width: 300px;
            flex-direction: row;
            flex-wrap: wrap;
        }

        .container .box{
            border: 2px solid blue;
            height: 50px;
            width: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box:nth-child(odd){
            color: seagreen;
            background-color: mistyrose;
        }
    </style>
</head>

<body>
    <center>
        <h1>Flex Wrap, Nth Child (Odd, Even)</h1>
    </center>

    <hr>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
    </div>
</body>

</html>
