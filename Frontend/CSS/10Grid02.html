<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(3, 1fr);
        }

        .container .box{
            background-color: teal;
            color: white;
            padding: 20px;
            display: grid;
            justify-content: center;
            align-items: center;
        }

        .box1{
            grid-column: span 2;
        }

        .box3{
            grid-row: span 2;
        }
    </style>
</head>
<body>
    <center>
        <h1>row span, column span</h1>
    </center>

    <hr>

    <div class="container">
        <div class="box box1">1</div>
        <div class="box">2</div>
        <div class="box box3">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        <div class="box">10</div>
    </div>
</body>
</html>
