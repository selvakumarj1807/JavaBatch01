<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            border: 2px solid red;
            display: flex;
            gap: 20px;
            padding: 20px;
            flex-direction: row;
            justify-content: flex-end;
            
        }

        .container .box{
            border: 2px solid blue;
            height: 50px;
            width: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box:nth-child(1){
            order: 4;
        }

        .box:nth-child(2){
            order: 3;
        }

        .box:nth-child(3){
            order: 1;
        }

        .box:nth-child(4){
            order: 2;
        }
    </style>
</head>

<body>
    <center>
        <h1>Flex End, Order</h1>
    </center>

    <hr>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>

</html>
