<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="value01" placeholder="Enter Value 01" value="0"><br><br>
    <input type="text" id="value02" placeholder="Enter Value 02" value="0"><br><br>

    <button onclick="addTwoNumbers()">To Click and get Add Two Number</button>

    <br><br>

    <input type="text" id="result01" placeholder="Click the Button and  Get Your Values Here" style="width: 300px;"">

    <p id="result02">Click the Button and Get Your Values Here</p>
    <script>
        function addTwoNumbers() {
            num1 = document.getElementById("value01").value;
            num2 = document.getElementById("value02").value;

            sum = parseFloat(num1) + parseFloat(num2);
            alert("The Sum of Two Numbers is: " + sum);

            document.getElementById("result01").value = sum;
            document.getElementById("result02").innerHTML = "The Sum of Two Numbers is: " + sum;

            if (sum > 100) {
                document.getElementById("result02").style.color = "green";
            } else {
                document.getElementById("result02").style.color = "red";
            }
        }
    </script>
</body>
</html>
