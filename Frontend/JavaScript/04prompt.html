<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p id="result">Click the button to display a Result.</p>

    <button onclick="display()">Click ME</button>


    <script>
        function display(){
            a = prompt("Enter your Value 01 : ");
            b = prompt("Enter your Value 02 : ");
            
            c = parseInt(a) + parseInt(b);

            document.getElementById("result").innerHTML = "Result : " + c;
        }
    </script>
</body>

</html>
